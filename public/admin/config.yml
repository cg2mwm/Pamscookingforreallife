backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: "cakes"
    label: "Cakes"
    folder: "content/cakes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Price ($)", name: "price", widget: "number", value_type: "float" }
      - { label: "Deposit %", name: "depositPercent", widget: "number", default: 30 }
      - { label: "Description", name: "description", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Wedding", "Birthday", "Anniversary", "Custom", "Seasonal"]
      - { label: "Hero Image", name: "image", widget: "image", required: false }
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        required: false
        field: { label: "Image", name: "image", widget: "image" }
      - { label: "Available for Order", name: "available", widget: "boolean", default: true }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false }
      - { label: "Servings", name: "servings", widget: "string", required: false }
      - label: "Allergens"
        name: "allergens"
        widget: "list"
        required: false
        field: { label: "Allergen", name: "item", widget: "string" }
      - { label: "Details (Body)", name: "body", widget: "markdown", required: false }

  - name: "blog"
    label: "Recipes & Blog"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Hero Image", name: "image", widget: "image", required: false }
      - { label: "Upload Video File", name: "video", widget: "file", required: false, hint: "Upload an MP4 file (keep under 50MB)" }
      - { label: "Or embed video URL", name: "videoUrl", widget: "string", required: false, hint: "YouTube or Vimeo URL" }
      - { label: "PDF Recipe Card", name: "recipePdf", widget: "file", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Content", name: "body", widget: "markdown" }

  - name: "settings"
    label: "Business Settings"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "content/settings/homepage.json"
        fields:
          - { label: "Bakery Name", name: "bakeryName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "About Story", name: "aboutStory", widget: "markdown" }
          - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Instagram Handle", name: "instagram", widget: "string", required: false }
          - { label: "Location / City", name: "location", widget: "string", required: false }

      - label: "Payment Settings"
        name: "payments"
        file: "content/settings/payments.json"
        fields:
          - label: "Payment Method"
            name: "method"
            widget: "select"
            options: ["PayPal", "Venmo", "CashApp", "Zelle", "BankTransfer", "Custom"]
          - { label: "PayPal Email or Venmo/CashApp Handle", name: "paymentId", widget: "string", hint: "e.g. youremail@gmail.com or @YourHandle" }
          - { label: "Custom Payment Instructions", name: "customInstructions", widget: "text", required: false, hint: "Used only if method is Custom" }

      - label: "Booking Availability"
        name: "availability"
        file: "content/settings/availability.json"
        fields:
          - label: "Available Dates"
            name: "dates"
            widget: "list"
            fields:
              - { label: "Date", name: "date", widget: "date" }
              - label: "Time Slots"
                name: "slots"
                widget: "list"
                field: { label: "Time", name: "time", widget: "string", hint: "e.g. 10:00 AM" }
              - { label: "Fully Booked", name: "booked", widget: "boolean", default: false }
